name: FAST Daily Newsletter

on:
  schedule:
    # 03:37 UTC = 05:37 Madrid (CEST verano) / 04:37 invierno.
    # Evidencia 2026-05-28/29: el cambio anterior a '17 5' (05:17 UTC) no
    # esquivó la cola — el job seguía corriendo 12h tarde. La hipótesis
    # nueva: la cola de cron de GitHub se concentra entre 05-09 UTC (peak
    # EU morning). Movido a 03:37 UTC (madrugada europea, ventana muerta).
    # Minuto raro (37) para evitar el segundo bug conocido (:00 :15 :30 :45
    # están sobre-suscriptos). Esto vive 2-3 días más hasta que se apague
    # el daily.yml definitivo el martes 2026-06-02 — la prueba sirve para
    # confirmar si la cola horaria es la causa real del delay.
    - cron: '37 3 * * 1-5'
  workflow_dispatch:  # permite trigger manual desde la UI de Actions

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # para commit del history.json actualizado
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build newsletter (Claude API + web_search)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node build_newsletter.mjs daily

      - name: Send via Gmail API
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
        run: |
          node send_newsletter.mjs \
            --to "pablo.pilanski@qformedia.com" \
            --subject "$(cat /tmp/subject.txt)" \
            --html-file /tmp/body.html

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --cached --quiet || git commit -m "history: $(date -u +%Y-%m-%d) daily"
          git push
