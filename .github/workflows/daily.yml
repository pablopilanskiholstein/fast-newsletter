name: FAST Daily Newsletter

on:
  # CRON DEL DAILY APAGADO el 2026-06-01.
  # El daily se migró a Google Workspace Studio (Gemini, gratis), que dispara
  # puntual lun-vie 08:00 Madrid. Este workflow de GitHub Actions ya no se
  # usa para el daily — se deja solo con workflow_dispatch por si hace falta
  # un disparo manual de emergencia (usa la API de Anthropic, ~$0.10/run).
  # schedule:
  #   - cron: '37 3 * * 1-5'
  workflow_dispatch:  # solo trigger manual; el daily de producción vive en Workspace Studio

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # para commit del history.json actualizado
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build newsletter (Claude API + web_search)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node build_newsletter.mjs daily

      - name: Send via Gmail API
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
        run: |
          node send_newsletter.mjs \
            --to "pablo.pilanski@qformedia.com" \
            --subject "$(cat /tmp/subject.txt)" \
            --html-file /tmp/body.html

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --cached --quiet || git commit -m "history: $(date -u +%Y-%m-%d) daily"
          git push
