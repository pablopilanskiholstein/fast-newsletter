name: FAST Daily Newsletter

on:
  schedule:
    # 05:17 UTC = 07:17 Madrid (CEST verano) / 06:17 invierno.
    # Minuto raro (17) y fuera de hora-punta (no es :00) para evitar la cola
    # gigante de cron de GitHub Actions que delayaba este job 10-12h cuando
    # estaba en '0 6 * * 1-5'.
    - cron: '17 5 * * 1-5'
  workflow_dispatch:  # permite trigger manual desde la UI de Actions

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # para commit del history.json actualizado
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build newsletter (Claude API + web_search)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node build_newsletter.mjs daily

      - name: Send via Gmail API
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
        run: |
          node send_newsletter.mjs \
            --to "pablo.pilanski@qformedia.com" \
            --subject "$(cat /tmp/subject.txt)" \
            --html-file /tmp/body.html

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --cached --quiet || git commit -m "history: $(date -u +%Y-%m-%d) daily"
          git push
