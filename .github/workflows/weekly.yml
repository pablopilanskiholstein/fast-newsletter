name: FAST Weekly Newsletter

on:
  # CRON NATIVO DESHABILITADO 2026-06-01.
  # Motivo: GitHub Actions disparaba el schedule 9-12h tarde de forma
  # consistente (best-effort, sin SLA — confirmado en docs oficiales de
  # GitHub y medido en este repo). Inservible para un mail puntual a jefes.
  # El disparo puntual se hace ahora vía SCHEDULER EXTERNO (cron-job.org /
  # GCP / n8n) que llama a workflow_dispatch con audience=full a la hora
  # exacta. Si el scheduler externo aún no está configurado, NO hay disparo
  # automático: hay que reactivar este cron o disparar a mano.
  # schedule:
  #   - cron: '42 4 * * 1'
  workflow_dispatch:
    inputs:
      audience:
        description: "Destinatarios: 'full' = los 4 (producción), 'solo' = solo pablo (test)"
        type: choice
        options:
          - solo
          - full
        default: solo

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build weekly newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node build_newsletter.mjs weekly

      - name: Send via Gmail API
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
        run: |
          # Destinatarios según el input 'audience' del workflow_dispatch.
          #   full         -> los 4 (producción: pablo, quim, robin, albert)
          #   solo / vacío -> solo pablo (default seguro; test y disparos sin especificar)
          # Un scheduler externo dispara con audience=full para la producción semanal.
          if [ "${{ github.event.inputs.audience }}" = "full" ]; then
            TO="pablo.pilanski@qformedia.com,quim.campa@qformedia.com,robin.valero@qformedia.com,albert.merino@qformedia.com"
          else
            TO="pablo.pilanski@qformedia.com"
          fi
          node send_newsletter.mjs \
            --to "$TO" \
            --subject "$(cat /tmp/subject.txt)" \
            --html-file /tmp/body.html

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --cached --quiet || git commit -m "history: $(date -u +%Y-%m-%d) weekly"
          git push
